<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>イベント情報</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

    <h1>イベント一覧</h1>
    <!-- CSVのデータがこのdivタグの中にテーブルとして生成されます -->
    <div id="csv-data-container">読み込み中...</div>

    <script>
        // 読み込むCSVファイルのパスを指定します（実際のファイル名に合わせて変更してください）
        const csvFilePath = '【フォーム1】第20回まちカフェ！参加申込書（回答）フォームの回答 1.csv';

        fetch(csvFilePath)
            .then(response => {
                if (!response.ok) {
                    throw new Error('CSVファイルの読み込みに失敗しました');
                }
                return response.text();
            })
            .then(csvText => {
                // 改行コードで分割して行ごとの配列にする
                const rows = csvText.split('\n');
                let html = '<table>';

                rows.forEach((row, index) => {
                    // 空行はスキップ
                    if (row.trim() === '') return;
                    
                    // カンマで分割してカラムごとの配列にする
                    const columns = row.split(',');
                    html += '<tr>';
                    
                    columns.forEach(column => {
                        // 1行目は見出し（th）にする
                        if (index === 0) {
                            html += `<th>${column.trim()}</th>`;
                        } else {
                            html += `<td>${column.trim()}</td>`;
                        }
                    });
                    
                    html += '</tr>';
                });

                html += '</table>';
                
                // HTMLに書き出す
                document.getElementById('csv-data-container').innerHTML = html;
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('csv-data-container').innerHTML = 'データを読み込めませんでした。';
            });
    </script>

</body>
</html>
