<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>イベント情報</title>
    <style>
        /* 全体の設定 */
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 15px;
            font-size: 21px; /* 文字サイズ大きめ */
            line-height: 1.6;
        }

        /* 枠を画面横幅いっぱいに広げる設定 */
        .container {
            width: 100%;
            max-width: 98%; /* 画面幅いっぱいに拡大 */
            margin: 0 auto;
            background-color: #ffffff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 29px;
        }

        /* テーブルの横スクロール対応 */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* 表全体の横幅を100%に広げる */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 14px 18px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
            font-size: 21px;
            white-space: nowrap; /* テキストの自然な見易さを維持 */
        }

        /* 見出し（ヘッダー） */
        th {
            background-color: #3498db;
            color: #ffffff;
            font-weight: bold;
        }

        /* 偶数行の背景色（ストライプ） */
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        /* マウスオーバー時のエフェクト */
        tr:hover {
            background-color: #e8f4f8;
            transition: background-color 0.2s ease;
        }

        /* トップページへ戻るボタン */
        .nav-btn {
            display: inline-block;
            background-color: #3498db;
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 21px;
            text-decoration: none;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .nav-btn:hover {
            background-color: #2980b9;
        }

        .status-message {
            text-align: center;
            color: #7f8c8d;
            padding: 20px;
            font-size: 21px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- トップページへ戻るボタン（上部配置） -->
        <div style="text-align: center; margin-bottom: 20px;">
            <a href="./" class="nav-btn">トップページに戻る</a>
        </div>

        <h1>イベント一覧</h1>
        
        <!-- 表が生成されるコンテナ -->
        <div class="table-responsive" id="csv-data-container">
            <div class="status-message">データを読み込み中...</div>
        </div>
    </div>

    <script>
        const csvFilePath = '  1.csv';

        fetch(csvFilePath)
            .then(response => {
                if (!response.ok) {
                    throw new Error('CSVファイルの読み込みに失敗しました');
                }
                return response.text();
            })
            .then(csvText => {
                const rows = csvText.split('\n');
                let html = '<table>';

                rows.forEach((row, index) => {
                    if (row.trim() === '') return;
                    
                    const columns = row.split(',');
                    html += '<tr>';
                    
                    columns.forEach(column => {
                        const text = column.trim().replace(/^"|"$/g, ''); 
                        
                        if (index === 0) {
                            html += `<th>${text}</th>`;
                        } else {
                            html += `<td>${text}</td>`;
                        }
                    });
                    
                    html += '</tr>';
                });

                html += '</table>';
                
                document.getElementById('csv-data-container').innerHTML = html;
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('csv-data-container').innerHTML = 
                    '<div class="status-message" style="color: #e74c3c;">CSVデータの読み込みに失敗しました。ローカルサーバーで起動しているか確認してください。</div>';
            });
    </script>

</body>
</html>
