<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>イベント情報</title>
    <style>
        /* 全体の設定 */
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 15px;
            font-size: 21px; /* 文字サイズ大きめ */
            line-height: 1.6;
        }

        /* 枠を画面横幅いっぱいに広げる設定 */
        .container {
            width: 100%;
            max-width: 98%; /* 画面幅いっぱいに拡大 */
            margin: 0 auto;
            background-color: #ffffff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 29px;
        }

        /* 検索ボックスのエリア */
        .search-container {
            margin-bottom: 25px;
            text-align: center;
        }

        .search-input {
            width: 100%;
            max-width: 600px;
            padding: 12px 20px;
            font-size: 21px;
            border: 2px solid #3498db;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .search-input:focus {
            border-color: #2980b9;
            box-shadow: 0 0 8px rgba(52, 152, 219, 0.4);
        }

        /* テーブルの横スクロール対応 */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* 表全体の横幅を100%に広げる */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 14px 18px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
            font-size: 21px;
            white-space: nowrap; /* テキストの自然な見易さを維持 */
        }

        /* 見出し（ヘッダー） */
        th {
            background-color: #3498db;
            color: #ffffff;
            font-weight: bold;
        }

        /* 偶数行の背景色（ストライプ） */
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        /* マウスオーバー時のエフェクト */
        tr:hover {
            background-color: #e8f4f8;
            transition: background-color 0.2s ease;
        }

        /* トップページへ戻るボタン */
        .nav-btn {
            display: inline-block;
            background-color: #3498db;
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 21px;
            text-decoration: none;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .nav-btn:hover {
            background-color: #2980b9;
        }

        .status-message {
            text-align: center;
            color: #7f8c8d;
            padding: 20px;
            font-size: 21px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- トップページへ戻るボタン（上部配置） -->
        <div style="text-align: center; margin-bottom: 20px;">
            <a href="./" class="nav-btn">トップページに戻る</a>
        </div>

        <h1>イベント一覧</h1>
        
        <!-- 検索入力エリア -->
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 団体名・ジャンルなどで検索...">
        </div>

        <!-- 表が生成されるコンテナ -->
        <div class="table-responsive" id="csv-data-container">
            <div class="status-message">データを読み込み中...</div>
        </div>
    </div>

    <script>
        const csvFilePath = '【フォーム1】第20回まちカフェ！参加申込書（回答）フォームの回答 1.csv';
        let headerRow = [];
        let bodyRows = [];

        // 表の描画処理
        function renderTable(filteredRows) {
            const container = document.getElementById('csv-data-container');
            
            if (filteredRows.length === 0) {
                container.innerHTML = '<div class="status-message">該当するイベントが見つかりませんでした。</div>';
                return;
            }

            let html = '<table><thead><tr>';
            
            // ヘッダー（見出し）の作成
            headerRow.forEach(col => {
                html += `<th>${col}</th>`;
            });
            html += '</tr></thead><tbody>';

            // データ行の作成
            filteredRows.forEach(row => {
                html += '<tr>';
                row.forEach(col => {
                    html += `<td>${col}</td>`;
                });
                html += '</tr>';
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        // CSV取得とデータ保持
        fetch(csvFilePath)
            .then(response => {
                if (!response.ok) {
                    throw new Error('CSVファイルの読み込みに失敗しました');
                }
                return response.text();
            })
            .then(csvText => {
                const lines = csvText.split('\n');
                const parsedData = [];

                lines.forEach((line) => {
                    if (line.trim() === '') return;
                    const columns = line.split(',').map(col => col.trim().replace(/^"|"$/g, ''));
                    parsedData.push(columns);
                });

                if (parsedData.length > 0) {
                    headerRow = parsedData[0];
                    bodyRows = parsedData.slice(1);
                    renderTable(bodyRows);
                } else {
                    document.getElementById('csv-data-container').innerHTML = 
                        '<div class="status-message">データが空です。</div>';
                }
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('csv-data-container').innerHTML = 
                    '<div class="status-message" style="color: #e74c3c;">CSVデータの読み込みに失敗しました。ローカルサーバーで起動しているか確認してください。</div>';
            });

        // リアルタイム検索イベント
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const keyword = e.target.value.toLowerCase().trim();
            
            if (!keyword) {
                renderTable(bodyRows);
                return;
            }

            // 行内のどこかにキーワードが含まれているものを抽出
            const filtered = bodyRows.filter(row => {
                return row.some(cell => cell.toLowerCase().includes(keyword));
            });

            renderTable(filtered);
        });
    </script>

</body>
</html>
